<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Submit a Job | GeniusSeeker</title>
  <meta name="description" content="Submit your open position. We review the details and post it to the public job board." />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="page">
    <section class="container hero">
      <div class="hero-inner">
        <div>
          <p class="kicker">Employers</p>
          <h1>Submit Your Open Position</h1>
          <p class="muted">
            Submit your position and after we review the information we will post it on our public Job Board (coming soon).
          </p>

          <div class="card" style="margin-top:14px">
            <h3>What happens next?</h3>
            <p class="muted">We respond within 2 business days with any questions and next steps.</p>
          </div>
        </div>

        <aside class="hero-card">
          <h3>Job submission request</h3>
          <form class="form" method="post" action="#">
            <div class="field">
              <label for="company">Company</label>
              <input id="company" name="company" type="text" required />
            </div>
            <div class="field">
              <label for="title">Role title</label>
              <input id="title" name="title" type="text" required />
            </div>
            <div class="field">
              <label for="type">Job type</label>
              <select id="type" name="type">
                <option>Full-time</option>
                <option>Contract</option>
                <option>Part-time</option>
                <option>Freelance</option>
                <option>Internship</option>
                <option>Temporary</option>
                <option>Volunteer</option>
              </select>
            </div>
            <div class="field">
              <label for="remote">Work style</label>
              <select id="remote" name="remote">
                <option>On-site</option>
                <option>Hybrid</option>
                <option>Remote</option>
              </select>
            </div>
            <div class="field">
              <label for="desc">Role description</label>
              <textarea id="desc" name="desc" required></textarea>
            </div>
            <div class="field">
              <label for="email">Your email</label>
              <input id="email" name="email" type="email" required />
            </div>
            <button class="btn" type="submit">Submit Job</button>
          </form>
        </aside>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="/js/main.js"></script>
</body>
</html>
