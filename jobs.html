<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="gs-api" content="" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jobs | GeniusSeeker</title>
  <meta name="description" content="Browse jobs across STEAM categories. Filter by remote, job type, and pay rate." />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .jobs-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 24px;
      align-items: start;
      margin-top: 24px;
    }
    @media (max-width: 768px) { .jobs-layout { grid-template-columns: 1fr; } }

    /* ── Filters ── */
    .filters-panel {
      background: var(--surface, #1a1a1a);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 12px;
      padding: 20px;
      position: sticky;
      top: 20px;
    }
    .filters-panel h3 {
      font-size: .85rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 16px;
      opacity: .6;
    }
    .filter-group { margin-bottom: 20px; }
    .filter-group label { display: block; font-size: .8rem; opacity: .7; margin-bottom: 6px; }
    .filter-group select {
      width: 100%; padding: 8px 10px; border-radius: 8px;
      border: 1px solid var(--border, #2a2a2a);
      background: var(--bg, #111); color: inherit; font-size: .9rem;
    }
    .filter-reset {
      background: none; border: none; color: inherit;
      opacity: .5; font-size: .8rem; cursor: pointer;
      padding: 0; text-decoration: underline;
    }
    .filter-reset:hover { opacity: 1; }

    /* ── Search ── */
    .search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
    .search-bar input {
      flex: 1; padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border, #2a2a2a);
      background: var(--surface, #1a1a1a);
      color: inherit; font-size: .95rem;
    }
    .results-meta { font-size: .85rem; opacity: .5; margin-bottom: 14px; }

    /* ── Job card ── */
    .job-card {
      background: var(--surface, #1a1a1a);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .job-card:hover { border-color: rgba(201,168,76,.45); }

    /* Collapsed summary row */
    .job-summary {
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .job-summary-left { flex: 1; min-width: 0; }
    .job-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 3px; }
    .job-company { font-size: .88rem; opacity: .6; margin-bottom: 10px; }

    .job-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: .72rem; font-weight: 500;
      padding: 3px 10px; border-radius: 999px;
      border: 1px solid var(--border, #2a2a2a);
      white-space: nowrap;
    }
    .tag-steam  { border-color: #c9a84c55; color: #c9a84c; }
    .tag-remote { border-color: #4caf9055; color: #4caf90; }
    .tag-type   { border-color: #7a9fff55; color: #7a9fff; }
    .tag-pay    { border-color: #e07b7b55; color: #e07b7b; }
    .tag-loc    { opacity: .45; }
    .tag-date   { opacity: .35; }

    /* Card action buttons */
    .job-summary-actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
    .btn-details {
      background: none;
      border: 1px solid var(--border, #2a2a2a);
      color: inherit; padding: 7px 16px; border-radius: 8px;
      font-size: .83rem; font-weight: 500; cursor: pointer;
      opacity: .7; transition: opacity .2s, border-color .2s;
    }
    .btn-details:hover, .btn-details.open { opacity: 1; border-color: #888; }

    .btn-apply-card {
      background: none;
      border: 1px solid var(--accent, #c9a84c);
      color: var(--accent, #c9a84c);
      padding: 7px 16px; border-radius: 8px;
      font-size: .83rem; font-weight: 500; cursor: pointer;
      transition: background .2s, color .2s;
    }
    .btn-apply-card:hover,
    .btn-apply-card.open { background: var(--accent, #c9a84c); color: #000; }

    /* Details panel */
    .job-details {
      display: none;
      border-top: 1px solid var(--border, #2a2a2a);
      padding: 20px 22px;
      background: rgba(0,0,0,.15);
    }
    .job-details.visible { display: block; }
    .job-details-body {
      font-size: .9rem; line-height: 1.75;
      opacity: .8; white-space: pre-wrap;
    }

    /* Apply panel */
    .apply-panel {
      display: none;
      border-top: 1px solid var(--border, #2a2a2a);
      padding: 22px 22px 24px;
    }
    .apply-panel.visible { display: block; }
    .apply-panel h4 {
      font-size: .92rem; font-weight: 600;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border, #2a2a2a);
    }
    .apply-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    @media (max-width: 560px) { .apply-grid { grid-template-columns: 1fr; } }
    .apply-grid .full { grid-column: 1 / -1; }
    .apply-panel label { font-size: .8rem; opacity: .65; display: block; margin-bottom: 4px; }
    .apply-panel input,
    .apply-panel textarea {
      width: 100%; padding: 9px 11px; border-radius: 8px;
      border: 1px solid var(--border, #2a2a2a);
      background: var(--bg, #111); color: inherit; font-size: .88rem;
    }
    .apply-panel textarea { min-height: 90px; resize: vertical; }
    .apply-actions { display: flex; gap: 10px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
    .apply-status { font-size: .82rem; opacity: .6; }

    .no-results { text-align: center; padding: 48px 0; opacity: .4; font-size: .95rem; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="page">
    <section class="container">

      <div style="margin-bottom:8px">
        <p class="kicker">Jobs</p>
        <h1>Find Your Next Role</h1>
        <p class="muted">Browse open positions across STEAM disciplines. Apply directly — no account needed.</p>
      </div>

      <div class="jobs-layout">

        <!-- ── FILTERS SIDEBAR ── -->
        <aside class="filters-panel">
          <h3>Filters</h3>
          <div class="filter-group">
            <label for="f-steam">STEAM Category</label>
            <select id="f-steam">
              <option value="">All categories</option>
              <option value="Science">Science</option>
              <option value="Technology">Technology</option>
              <option value="Engineering">Engineering</option>
              <option value="Art">Art</option>
              <option value="Mathematics">Mathematics</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="f-remote">Work Style</label>
            <select id="f-remote">
              <option value="">All</option>
              <option value="Remote">Remote</option>
              <option value="Hybrid">Hybrid</option>
              <option value="On-site">On-site</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="f-type">Job Type</label>
            <select id="f-type">
              <option value="">All types</option>
              <option value="Full-time">Full-time</option>
              <option value="Contract">Contract</option>
              <option value="Part-time">Part-time</option>
              <option value="Freelance">Freelance</option>
            </select>
          </div>
          <button class="filter-reset" id="resetFilters">Reset filters</button>
        </aside>

        <!-- ── JOB LIST ── -->
        <div>
          <div class="search-bar">
            <input id="searchInput" type="text" placeholder="Search job title, company, keyword…" />
          </div>
          <p class="results-meta" id="resultsMeta"></p>
          <div id="jobList"></div>
        </div>

      </div>

      <!-- CTA strip -->
      <div class="card" style="margin-top:32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px">
        <div>
          <strong>Have a role to fill?</strong>
          <p class="muted" style="margin:0">Submit an opening and we'll review it within 2 business days.</p>
        </div>
        <div class="actions">
          <a class="btn" href="/submit-a-job.html">Post a Job</a>
          <a class="btn btn-ghost" href="/candidates.html">Take the STEAM Quiz</a>
        </div>
      </div>

    </section>
  </main>

  <div id="site-footer"></div>
  <script src="/js/main.js"></script>
  <script>
  const apiBase = document.querySelector('meta[name="gs-api"]')?.getAttribute("content") || "";

  const SAMPLE_JOBS = [
    { id:"s1", title:"Cybersecurity Analyst", company:"ShieldNet Solutions", steam:"Technology", remote:"Remote", type:"Full-time", pay:"$90k – $120k", location:"Louisville, KY (Remote)", created_at:"2026-03-05",
      description:"Protect critical infrastructure and monitor threats across enterprise environments.\n\nResponsibilities:\n• Monitor security alerts and respond to incidents\n• Conduct vulnerability assessments\n• Document findings and recommend remediation\n\nRequirements:\n• 3+ years in SOC or incident response\n• Experience with SIEM tools\n• Security+ or equivalent preferred" },
    { id:"s2", title:"Data Scientist", company:"Axiom Analytics", steam:"Mathematics", remote:"Hybrid", type:"Full-time", pay:"$110k – $145k", location:"Chicago, IL", created_at:"2026-03-06",
      description:"Build predictive models and data pipelines to support product and operations teams.\n\nResponsibilities:\n• Design and implement ML models\n• Collaborate with product and engineering\n• Present findings to stakeholders\n\nRequirements:\n• Proficiency in Python and SQL\n• Experience with scikit-learn or similar\n• Strong communication skills" },
    { id:"s3", title:"Frontend Engineer", company:"Luminara Digital", steam:"Technology", remote:"Remote", type:"Full-time", pay:"$100k – $130k", location:"Remote (US/CAN)", created_at:"2026-03-08",
      description:"Build performant, accessible web experiences for a growing SaaS platform.\n\nResponsibilities:\n• Develop and maintain React/TypeScript components\n• Collaborate with design on UI/UX\n• Write tests and maintain documentation\n\nRequirements:\n• 3+ years with React and TypeScript\n• Strong CSS fundamentals\n• Async-first, remote-friendly mindset" },
    { id:"s4", title:"UX / Product Designer", company:"Craft Studio Co.", steam:"Art", remote:"Remote", type:"Contract", pay:"$65 – $85/hr", location:"Remote (US)", created_at:"2026-03-07",
      description:"Lead end-to-end design for a B2B SaaS platform.\n\nResponsibilities:\n• Own the full design process from research to delivery\n• Build and maintain a component library in Figma\n• Work closely with engineering during implementation\n\nRequirements:\n• Strong Figma skills\n• Portfolio demonstrating systems thinking\n• B2B SaaS experience a plus" },
    { id:"s5", title:"DevOps Engineer", company:"Stackwell Inc.", steam:"Engineering", remote:"On-site", type:"Full-time", pay:"$105k – $130k", location:"Austin, TX", created_at:"2026-03-04",
      description:"Own CI/CD pipelines, cloud infrastructure, and reliability practices.\n\nResponsibilities:\n• Manage AWS infrastructure with Terraform\n• Build and maintain CI/CD pipelines\n• On-call rotation for production incidents\n\nRequirements:\n• Strong AWS and Linux experience\n• Familiarity with Docker and Kubernetes\n• Startup experience preferred" }
  ];

  let JOBS = [];

  async function loadJobs() {
    document.getElementById("resultsMeta").textContent = "Loading…";
    try {
      const res = await fetch(apiBase + "/api/jobs");
      if (res.ok) {
        const data = await res.json();
        JOBS = (data.jobs || []).map(j => ({
          id:          j.id,
          title:       j.title,
          company:     j.company,
          steam:       j.steam    || "Other",
          remote:      j.remote   || "—",
          type:        j.type     || "—",
          pay:         j.pay      || "—",
          location:    j.location || "—",
          created_at:  j.created_at,
          description: j.description || "",
        }));
        if (JOBS.length === 0) JOBS = SAMPLE_JOBS;
      } else {
        JOBS = SAMPLE_JOBS;
      }
    } catch (_) {
      JOBS = SAMPLE_JOBS;
    }
    render();
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric" });
  }

  function buildCard(job) {
    return `
      <div class="job-card" id="card-${job.id}">

        <div class="job-summary">
          <div class="job-summary-left">
            <div class="job-title">${job.title}</div>
            <div class="job-company">${job.company}</div>
            <div class="job-tags">
              <span class="tag tag-steam">${job.steam}</span>
              <span class="tag tag-remote">${job.remote}</span>
              <span class="tag tag-type">${job.type}</span>
              <span class="tag tag-pay">${job.pay}</span>
              <span class="tag tag-loc">📍 ${job.location}</span>
              <span class="tag tag-date">Posted ${formatDate(job.created_at)}</span>
            </div>
          </div>
          <div class="job-summary-actions">
            <button class="btn-details" onclick="toggleDetails('${job.id}', this)">View Details</button>
            <button class="btn-apply-card" onclick="toggleApply('${job.id}', this)">Apply Now</button>
          </div>
        </div>

        <div class="job-details" id="details-${job.id}">
          <div class="job-details-body">${job.description || "No description provided."}</div>
        </div>

        <div class="apply-panel" id="apply-${job.id}">
          <h4>Apply for: ${job.title} <span style="opacity:.5;font-weight:400">at ${job.company}</span></h4>
          <div class="apply-grid">
            <div>
              <label>First &amp; Last Name *</label>
              <input type="text" placeholder="Jane Smith" />
            </div>
            <div>
              <label>Email *</label>
              <input type="email" placeholder="jane@email.com" />
            </div>
            <div>
              <label>Phone (optional)</label>
              <input type="tel" placeholder="+1 (555) 000-0000" />
            </div>
            <div>
              <label>LinkedIn or Portfolio URL</label>
              <input type="url" placeholder="https://linkedin.com/in/…" />
            </div>
            <div class="full">
              <label>Hedera Account ID (optional — links to your STEAM badge)</label>
              <input type="text" placeholder="0.0.12345" id="applyHedera-${job.id}" />
            </div>
            <div class="full">
              <label>Why are you a great fit?</label>
              <textarea placeholder="A few sentences about your background and interest…"></textarea>
            </div>
          </div>
          <div class="apply-actions">
            <button class="btn" onclick="submitApply(this, '${job.id}')">Submit Application</button>
            <button class="btn btn-ghost" onclick="toggleApply('${job.id}', document.querySelector('#card-${job.id} .btn-apply-card'))">Cancel</button>
            <span class="apply-status" id="apply-status-${job.id}"></span>
          </div>
        </div>

      </div>`;
  }

  function render() {
    const search  = document.getElementById("searchInput").value.toLowerCase();
    const fSteam  = document.getElementById("f-steam").value;
    const fRemote = document.getElementById("f-remote").value;
    const fType   = document.getElementById("f-type").value;

    const filtered = JOBS.filter(j => {
      const matchSearch = !search ||
        j.title.toLowerCase().includes(search) ||
        j.company.toLowerCase().includes(search) ||
        (j.description || "").toLowerCase().includes(search);
      return matchSearch &&
        (!fSteam  || j.steam  === fSteam) &&
        (!fRemote || j.remote === fRemote) &&
        (!fType   || j.type   === fType);
    });

    const list = document.getElementById("jobList");
    const meta = document.getElementById("resultsMeta");

    meta.textContent = filtered.length === JOBS.length
      ? `${JOBS.length} open role${JOBS.length !== 1 ? "s" : ""}`
      : `${filtered.length} of ${JOBS.length} roles match`;

    if (filtered.length === 0) {
      list.innerHTML = `<div class="no-results">No roles match your filters. <button class="filter-reset" onclick="resetAll()">Clear filters</button></div>`;
      return;
    }

    list.innerHTML = filtered.map(buildCard).join("");

    const savedId = (window.GSIdentity && GSIdentity.getAccountId()) ||
                    localStorage.getItem("gs_hedera_account_id") || "";
    if (savedId) {
      filtered.forEach(j => {
        const el = document.getElementById(`applyHedera-${j.id}`);
        if (el) el.value = savedId;
      });
    }
  }

  function toggleDetails(id, btn) {
    const panel = document.getElementById(`details-${id}`);
    const isOpen = panel.classList.contains("visible");
    panel.classList.toggle("visible", !isOpen);
    btn.textContent = isOpen ? "View Details" : "Hide Details";
    btn.classList.toggle("open", !isOpen);
  }

  function toggleApply(id, btn) {
    const panel = document.getElementById(`apply-${id}`);
    const isOpen = panel.classList.contains("visible");
    document.querySelectorAll(".apply-panel.visible").forEach(p => p.classList.remove("visible"));
    document.querySelectorAll(".btn-apply-card.open").forEach(b => {
      b.classList.remove("open"); b.textContent = "Apply Now";
    });
    if (!isOpen) {
      panel.classList.add("visible");
      btn.classList.add("open");
      btn.textContent = "Close";
      panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  }

  async function submitApply(btn, id) {
    const panel  = document.getElementById(`apply-${id}`);
    const status = document.getElementById(`apply-status-${id}`);
    const inputs = panel.querySelectorAll("input, textarea");

    const name  = inputs[0].value.trim();
    const email = inputs[1].value.trim();
    if (!name || !email) { status.textContent = "Please fill in your name and email."; return; }

    btn.disabled = true;
    btn.textContent = "Sending…";
    status.textContent = "";

    const job = JOBS.find(j => String(j.id) === String(id));
    const payload = {
      job_title:  job.title,  company: job.company,
      name, email,
      phone:      inputs[2].value.trim(),
      portfolio:  inputs[3].value.trim(),
      hedera_id:  inputs[4].value.trim(),
      cover_note: inputs[5].value.trim(),
    };

    try {
      const res = await fetch(apiBase + "/api/apply", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (res.ok) {
        panel.innerHTML = `<p style="color:#4caf90;padding:16px 0 8px">✅ Application submitted! We'll be in touch soon.</p>`;
      } else {
        throw new Error(`Server responded ${res.status}`);
      }
    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Submit Application";
      status.textContent = "⚠️ Submission failed — " + err.message;
    }
  }

  function resetAll() {
    document.getElementById("f-steam").value     = "";
    document.getElementById("f-remote").value    = "";
    document.getElementById("f-type").value      = "";
    document.getElementById("searchInput").value = "";
    render();
  }

  document.getElementById("searchInput").addEventListener("input", render);
  document.getElementById("f-steam").addEventListener("change", render);
  document.getElementById("f-remote").addEventListener("change", render);
  document.getElementById("f-type").addEventListener("change", render);
  document.getElementById("resetFilters").addEventListener("click", resetAll);

  loadJobs();
  </script>
</body>
</html>
