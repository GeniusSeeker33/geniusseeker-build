<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="gs-api" content="" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Offers | GeniusSeeker</title>
  <meta name="description" content="View and respond to contract offers from verified employers." />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .inbox-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      padding: 28px 0 24px;
      border-bottom: 1px solid var(--border, #2a2a2a);
      margin-bottom: 28px;
    }

    .offer-card {
      background: var(--surface, #1a1a1a);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 14px; margin-bottom: 16px;
      overflow: hidden; transition: border-color .2s;
    }
    .offer-card:hover { border-color: rgba(201,168,76,.25); }
    .offer-card.status-pending  { border-left: 3px solid #c9a84c; }
    .offer-card.status-countered{ border-left: 3px solid #5ba3d9; }
    .offer-card.status-accepted { border-left: 3px solid #4caf90; }
    .offer-card.status-contracted { border-left: 3px solid #4caf90; }
    .offer-card.status-declined { border-left: 3px solid #888; opacity: .55; }
    .offer-card.status-agreed   { border-left: 3px solid #4caf90; }

    .offer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px; flex-wrap: wrap; gap: 10px;
      cursor: pointer;
    }
    .offer-left  { display: flex; align-items: center; gap: 14px; }
    .offer-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .co-avatar {
      width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, rgba(201,168,76,.2), rgba(122,92,30,.12));
      border: 1px solid rgba(201,168,76,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; font-weight: 700; color: #c9a84c;
    }
    .offer-title   { font-weight: 600; font-size: .95rem; margin-bottom: 2px; }
    .offer-company { font-size: .8rem; opacity: .45; }
    .offer-rate    { font-size: .88rem; font-weight: 600; color: #c9a84c; }
    .offer-type    { font-size: .75rem; opacity: .45; }

    .status-pill {
      font-size: .7rem; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; padding: 3px 10px; border-radius: 999px;
    }
    .sp-pending    { background: rgba(201,168,76,.12); color: #c9a84c; border: 1px solid rgba(201,168,76,.3); }
    .sp-accepted   { background: rgba(76,175,144,.12); color: #4caf90; border: 1px solid rgba(76,175,144,.3); }
    .sp-agreed     { background: rgba(76,175,144,.12); color: #4caf90; border: 1px solid rgba(76,175,144,.3); }
    .sp-contracted { background: rgba(76,175,144,.15); color: #4caf90; border: 1px solid rgba(76,175,144,.4); }
    .sp-declined   { background: rgba(120,120,120,.1);  color: #888;    border: 1px solid rgba(120,120,120,.2); }
    .sp-countered  { background: rgba(91,163,217,.12); color: #5ba3d9; border: 1px solid rgba(91,163,217,.3); }
    .sp-completed  { background: rgba(76,175,144,.1);  color: #4caf90; border: 1px solid rgba(76,175,144,.2); }

    .chevron { transition: transform .25s; opacity: .35; }
    .chevron.open { transform: rotate(180deg); }

    .offer-detail {
      display: none;
      border-top: 1px solid var(--border, #2a2a2a);
      padding: 22px;
    }
    .offer-detail.open { display: block; }

    .detail-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 18px; }
    .detail-item .di-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; opacity: .4; margin-bottom: 3px; }
    .detail-item .di-value { font-size: .9rem; }

    .scope-box {
      background: rgba(255,255,255,.03); border: 1px solid var(--border, #2a2a2a);
      border-radius: 8px; padding: 12px 14px; font-size: .85rem;
      line-height: 1.65; opacity: .75; margin-bottom: 18px; white-space: pre-wrap;
    }

    .ms-table { width: 100%; border-collapse: collapse; margin-bottom: 18px; }
    .ms-table th { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; opacity: .4; text-align: left; padding: 6px 10px; }
    .ms-table td { font-size: .85rem; padding: 8px 10px; border-top: 1px solid var(--border, #2a2a2a); }

    /* Action area */
    .action-area { padding-top: 16px; border-top: 1px solid var(--border, #2a2a2a); }
    .action-area h4 { font-size: .78rem; text-transform: uppercase; letter-spacing: .08em; opacity: .4; margin-bottom: 14px; }
    .action-btns { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn-accept  { background: rgba(76,175,144,.15); color: #4caf90; border: 1px solid rgba(76,175,144,.3); }
    .btn-accept:hover { background: rgba(76,175,144,.25); }
    .btn-decline { background: rgba(120,120,120,.1); color: #888; border: 1px solid rgba(120,120,120,.25); }
    .btn-counter { background: rgba(91,163,217,.1); color: #5ba3d9; border: 1px solid rgba(91,163,217,.25); }
    .btn-counter:hover { background: rgba(91,163,217,.2); }

    .counter-panel {
      display: none; margin-top: 16px; padding: 16px;
      background: rgba(91,163,217,.05); border: 1px solid rgba(91,163,217,.2);
      border-radius: 10px;
    }
    .counter-panel.open { display: block; }
    .counter-panel .field { margin-bottom: 12px; }
    .counter-panel label { font-size: .8rem; opacity: .6; display: block; margin-bottom: 4px; }
    .counter-panel input, .counter-panel textarea {
      width: 100%; padding: 9px 11px; border-radius: 7px;
      border: 1px solid var(--border, #2a2a2a);
      background: rgba(255,255,255,.03); color: inherit;
      font-size: .88rem; font-family: inherit; box-sizing: border-box;
    }
    .counter-panel textarea { min-height: 70px; resize: vertical; }

    .action-msg { font-size: .82rem; padding: 8px 12px; border-radius: 7px; margin-top: 10px; display: none; }
    .action-msg.ok  { background: rgba(76,175,144,.1); color: #4caf90; }
    .action-msg.err { background: rgba(224,123,123,.1); color: #e07b7b; }

    /* Contract status card */
    .contract-status {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 10px;
      background: rgba(76,175,144,.06); border: 1px solid rgba(76,175,144,.2);
    }
    .contract-status .cs-icon { font-size: 1.3rem; }
    .contract-status .cs-title { font-size: .88rem; font-weight: 600; color: #4caf90; }
    .contract-status .cs-sub   { font-size: .78rem; opacity: .5; margin-top: 1px; }

    .empty-state { text-align: center; padding: 60px 0; opacity: .35; }
    .loading     { text-align: center; padding: 60px 0; opacity: .4; }
    .no-account  { text-align: center; padding: 60px 0; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main class="page">
    <section class="container">
      <div id="inboxRoot"><p class="loading">Loading offers…</p></div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="/js/main.js"></script>
  <script>
    const apiBase  = document.querySelector('meta[name="gs-api"]')?.getAttribute("content") || "";
    const myHedId  = localStorage.getItem("GS_HEDERA_ACCOUNT_ID") ||
                     localStorage.getItem("gs_hedera_account_id") || "";
    let allOffers  = [];

    const STATUS_META = {
      pending:    { pill: "sp-pending",    label: "New Offer"    },
      countered:  { pill: "sp-countered",  label: "Countered"    },
      accepted:   { pill: "sp-accepted",   label: "Accepted"     },
      agreed:     { pill: "sp-agreed",     label: "Agreed"       },
      contracted: { pill: "sp-contracted", label: "Contract Sent" },
      declined:   { pill: "sp-declined",   label: "Declined"     },
      completed:  { pill: "sp-completed",  label: "Completed"    },
    };

    const TYPE_LABELS = { milestone: "🎯 Milestone", hourly: "⏱️ Hourly", fixed: "📦 Fixed Price" };

    function companyInitials(name) {
      return (name||"?").split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
    }

    function fmtDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    function fmtRate(offer) {
      const r = parseFloat(offer.rate) || 0;
      if (offer.contract_type === "hourly") return `$${r.toLocaleString()}/hr`;
      return `$${r.toLocaleString()}`;
    }

    function renderInbox(offers) {
      const header = `
        <div class="inbox-header">
          <div>
            <p class="kicker">Candidate Dashboard</p>
            <h1>My Offers</h1>
          </div>
          <div style="font-size:.85rem;opacity:.5">${offers.length} offer${offers.length !== 1 ? "s" : ""}</div>
        </div>`;

      if (offers.length === 0) {
        document.getElementById("inboxRoot").innerHTML = header +
          `<div class="empty-state"><p>No offers yet.</p><p style="font-size:.8rem;margin-top:6px">When verified employers make you an offer, it'll appear here.</p></div>`;
        return;
      }

      document.getElementById("inboxRoot").innerHTML = header +
        offers.map(o => renderOfferCard(o)).join("");
    }

    function renderOfferCard(o) {
      const sm  = STATUS_META[o.status] || STATUS_META.pending;
      const milestones = o.milestones_json ? (() => { try { return JSON.parse(o.milestones_json); } catch { return []; } })() : [];
      const isPending   = o.status === "pending" || o.status === "countered";
      const isActive    = o.status === "contracted" || o.status === "agreed" || o.status === "accepted";

      const msTable = milestones.length > 0 ? `
        <table class="ms-table">
          <thead><tr><th>Milestone</th><th>Amount</th><th>Due</th></tr></thead>
          <tbody>
            ${milestones.map(m => `
              <tr>
                <td>${m.title || "—"}</td>
                <td>$${parseFloat(m.amount||0).toLocaleString()}</td>
                <td>${fmtDate(m.dueDate)}</td>
              </tr>`).join("")}
          </tbody>
        </table>` : "";

      const actionArea = isPending ? `
        <div class="action-area">
          <h4>Respond to this offer</h4>
          <div class="action-btns">
            <button class="btn btn-accept"  onclick="acceptOffer('${o.id}')">✓ Accept Offer</button>
            <button class="btn btn-counter" onclick="toggleCounter('${o.id}')">↔ Counter</button>
            <button class="btn btn-decline" onclick="declineOffer('${o.id}')">✕ Decline</button>
          </div>
          <div class="counter-panel" id="counter-${o.id}">
            <div class="field">
              <label>Proposed Rate / Terms (optional)</label>
              <input type="text" id="cr-rate-${o.id}" placeholder="e.g. 6000 or 85/hr" />
            </div>
            <div class="field">
              <label>Your Message *</label>
              <textarea id="cr-note-${o.id}" placeholder="Thank you for the offer. I'd like to discuss the rate…"></textarea>
            </div>
            <button class="btn btn-sm" onclick="submitCounter('${o.id}')">Send Counter</button>
          </div>
          <div class="action-msg" id="amsg-${o.id}"></div>
        </div>` :

      isActive ? `
        <div class="action-area">
          <div class="contract-status">
            <div class="cs-icon">📋</div>
            <div>
              <div class="cs-title">${o.status === "contracted" ? "Contract sent via Deel" : "Offer " + o.status}</div>
              <div class="cs-sub">
                ${o.status === "contracted"
                  ? "Check your email for the Deel contract signing link."
                  : "Awaiting next step from employer."}
              </div>
            </div>
          </div>
        </div>` :

      o.status === "declined" ? `
        <div class="action-area" style="opacity:.5;font-size:.85rem">You declined this offer.</div>` :
      o.status === "completed" ? `
        <div class="action-area">
          <div class="contract-status">
            <div class="cs-icon">🏆</div>
            <div>
              <div class="cs-title">Contract Completed</div>
              <div class="cs-sub">
                <a href="/employer-review.html?employer=${o.employer_id}&application=${o.id}&company=${encodeURIComponent(o.employer_company)}&job=${encodeURIComponent(o.role_title)}"
                   style="color:#c9a84c">Leave a review for ${o.employer_company} →</a>
              </div>
            </div>
          </div>
        </div>` : "";

      return `
      <div class="offer-card status-${o.status}" id="card-${o.id}">
        <div class="offer-header" onclick="toggleCard('${o.id}')">
          <div class="offer-left">
            <div class="co-avatar">${companyInitials(o.employer_company)}</div>
            <div>
              <div class="offer-title">${o.role_title}</div>
              <div class="offer-company">${o.employer_company} · ${fmtDate(o.created_at)}</div>
            </div>
          </div>
          <div class="offer-right">
            <div style="text-align:right">
              <div class="offer-rate">${fmtRate(o)}</div>
              <div class="offer-type">${TYPE_LABELS[o.contract_type] || o.contract_type}</div>
            </div>
            <span class="status-pill ${sm.pill}">${sm.label}</span>
            <svg class="chevron" id="chev-${o.id}" width="16" height="16"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>

        <div class="offer-detail" id="detail-${o.id}">
          <div class="detail-row">
            <div class="detail-item">
              <div class="di-label">From</div>
              <div class="di-value">${o.employer_company}</div>
            </div>
            <div class="detail-item">
              <div class="di-label">Contract Type</div>
              <div class="di-value">${TYPE_LABELS[o.contract_type] || o.contract_type}</div>
            </div>
            <div class="detail-item">
              <div class="di-label">${o.contract_type === "hourly" ? "Rate" : "Value"}</div>
              <div class="di-value">${fmtRate(o)} ${o.currency || "USD"}</div>
            </div>
            <div class="detail-item">
              <div class="di-label">Start Date</div>
              <div class="di-value">${fmtDate(o.start_date)}</div>
            </div>
          </div>

          ${o.scope ? `<div class="scope-box">${o.scope}</div>` : ""}
          ${msTable}
          ${o.counter_note ? `
            <div style="padding:10px 14px;border-radius:8px;background:rgba(91,163,217,.07);border:1px solid rgba(91,163,217,.2);font-size:.85rem;margin-bottom:16px">
              <strong style="color:#5ba3d9;font-size:.75rem;display:block;margin-bottom:4px">COUNTER NOTE</strong>
              ${o.counter_note}
            </div>` : ""}

          ${actionArea}
        </div>
      </div>`;
    }

    function toggleCard(id) {
      document.getElementById("detail-" + id)?.classList.toggle("open");
      document.getElementById("chev-"   + id)?.classList.toggle("open");
    }

    function toggleCounter(id) {
      document.getElementById("counter-" + id)?.classList.toggle("open");
    }

    async function acceptOffer(id) {
      await doOfferAction(id, "accept", { hederaId: myHedId });
    }
    async function declineOffer(id) {
      if (!confirm("Decline this offer?")) return;
      await doOfferAction(id, "decline", { hederaId: myHedId });
    }
    async function submitCounter(id) {
      const note = document.getElementById("cr-note-" + id)?.value.trim();
      const rate = document.getElementById("cr-rate-" + id)?.value.trim();
      if (!note) { showActionMsg(id, "err", "Please add a message with your counter."); return; }
      await doOfferAction(id, "counter", { hederaId: myHedId, counterNote: note, rate: rate || null });
    }

    async function doOfferAction(id, action, body) {
      try {
        const res  = await fetch(`${apiBase}/api/offers/${id}/${action}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.ok) {
          showActionMsg(id, "ok",
            action === "accept"  ? "✓ Offer accepted! The employer will be notified to generate the Deel contract." :
            action === "decline" ? "Offer declined." :
            "Counter sent! The employer will review your terms.");
          setTimeout(() => loadOffers(), 1200);
        } else {
          showActionMsg(id, "err", data.error || "Something went wrong.");
        }
      } catch { showActionMsg(id, "err", "Server error."); }
    }

    function showActionMsg(id, type, text) {
      const el = document.getElementById("amsg-" + id);
      if (!el) return;
      el.className = "action-msg " + type;
      el.textContent = text;
      el.style.display = "block";
    }

    async function loadOffers() {
      if (!myHedId) {
        document.getElementById("inboxRoot").innerHTML = `
          <div class="no-account">
            <h2>No profile found</h2>
            <p style="opacity:.5;margin:8px 0 20px">You need a GeniusSeeker profile to receive offers.</p>
            <a class="btn" href="/candidates.html">Set Up Profile →</a>
          </div>`;
        return;
      }
      try {
        const res  = await fetch(`${apiBase}/api/offers/candidate/${encodeURIComponent(myHedId)}`);
        const data = await res.json();
        allOffers  = data.offers || [];
        renderInbox(allOffers);
      } catch {
        document.getElementById("inboxRoot").innerHTML =
          `<div class="empty-state"><p>Could not load offers. Is the backend running?</p></div>`;
      }
    }

    loadOffers();
  </script>
</body>
</html>
