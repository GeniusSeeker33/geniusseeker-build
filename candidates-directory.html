<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="gs-api" content="https://organic-enigma-wx4jj76vg6x25p7q-8787.app.github.dev" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Candidate Directory | GeniusSeeker</title>
  <meta name="description" content="Browse verified STEAM candidates on GeniusSeeker." />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .dir-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 24px;
      align-items: start;
      margin-top: 24px;
    }
    @media (max-width: 768px) { .dir-layout { grid-template-columns: 1fr; } }

    /* Filters */
    .filters-panel {
      background: var(--surface, #1a1a1a);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 12px;
      padding: 20px;
      position: sticky;
      top: 20px;
    }
    .filters-panel h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: .1em; opacity: .5; margin-bottom: 14px; }
    .filter-group { margin-bottom: 18px; }
    .filter-group label { display: block; font-size: .78rem; opacity: .6; margin-bottom: 5px; }
    .filter-group select {
      width: 100%; padding: 8px 10px; border-radius: 8px;
      border: 1px solid var(--border, #2a2a2a);
      background: var(--bg, #111); color: inherit; font-size: .88rem;
    }
    .filter-reset { background: none; border: none; color: inherit; opacity: .45; font-size: .78rem; cursor: pointer; padding: 0; text-decoration: underline; }
    .filter-reset:hover { opacity: 1; }

    /* Search */
    .search-bar { display: flex; gap: 10px; margin-bottom: 14px; }
    .search-bar input {
      flex: 1; padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border, #2a2a2a);
      background: var(--surface, #1a1a1a);
      color: inherit; font-size: .95rem;
    }
    .results-meta { font-size: .82rem; opacity: .45; margin-bottom: 14px; }

    /* Candidate card */
    .candidate-card {
      background: var(--surface, #1a1a1a);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      transition: border-color .2s;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }
    .candidate-card:hover { border-color: rgba(201,168,76,.45); }

    .cand-avatar {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #c9a84c 0%, #7a5c1e 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700; color: #000;
      overflow: hidden;
    }
    .cand-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .cand-info { flex: 1; min-width: 0; }
    .cand-name { font-size: .98rem; font-weight: 600; margin-bottom: 3px; }
    .cand-bio  { font-size: .83rem; opacity: .55; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px; }
    .cand-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: .7rem; font-weight: 500;
      padding: 2px 9px; border-radius: 999px;
      border: 1px solid var(--border, #2a2a2a);
      white-space: nowrap;
    }
    .tag-steam  { border-color: #c9a84c55; color: #c9a84c; }
    .tag-level  { border-color: #7a9fff55; color: #7a9fff; }
    .tag-status-looking     { border-color: #4caf9055; color: #4caf90; }
    .tag-status-open        { border-color: #c9a84c55; color: #c9a84c; }
    .tag-status-not_looking { opacity: .4; }

    .cand-action { flex-shrink: 0; }
    .btn-view {
      background: none;
      border: 1px solid var(--border, #2a2a2a);
      color: inherit; padding: 6px 14px; border-radius: 8px;
      font-size: .8rem; cursor: pointer;
      transition: border-color .2s, opacity .2s; opacity: .6;
      text-decoration: none;
    }
    .btn-view:hover { opacity: 1; border-color: #888; }

    /* Login gate */
    .login-gate {
      background: var(--surface, #1a1a1a);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
      max-width: 440px;
      margin: 40px auto;
    }
    .login-gate h2 { margin-bottom: 8px; }
    .login-gate p  { opacity: .6; margin-bottom: 24px; font-size: .92rem; }
    .login-form { display: flex; flex-direction: column; gap: 10px; }
    .login-form input {
      padding: 10px 12px; border-radius: 8px;
      border: 1px solid var(--border, #2a2a2a);
      background: var(--bg, #111); color: inherit; font-size: .9rem;
    }
    .login-error { color: #e07b7b; font-size: .82rem; }

    .no-results { text-align: center; padding: 48px 0; opacity: .4; }
    .loading    { text-align: center; padding: 60px 0; opacity: .4; }
    .session-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(201,168,76,.08); border: 1px solid rgba(201,168,76,.2);
      border-radius: 8px; padding: 8px 16px; margin-bottom: 20px;
      font-size: .82rem;
    }
    .session-bar span { opacity: .7; }
    .btn-logout { background: none; border: none; color: #e07b7b; cursor: pointer; font-size: .8rem; padding: 0; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="page">
    <section class="container">
      <div style="margin-bottom:8px">
        <p class="kicker">Employers</p>
        <h1>Candidate Directory</h1>
        <p class="muted">Browse GeniusSeeker-verified STEAM candidates. Sign in to view full profiles.</p>
      </div>
      <div id="directoryRoot"><p class="loading">Loading…</p></div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="/js/main.js"></script>
  <script>
    const apiBase  = document.querySelector('meta[name="gs-api"]')?.getAttribute("content") || "";
    const TOKEN_KEY = "gs_employer_token";

    let ALL_CANDIDATES = [];

    const STEAM_ICONS = {
      Science: "🔬", Technology: "💻", Engineering: "⚙️",
      Art: "🎨", Mathematics: "📐", Other: "⭐"
    };
    const STATUS_MAP = {
      looking:     { label: "Actively Looking", cls: "tag-status-looking" },
      open:        { label: "Open to Offers",    cls: "tag-status-open" },
      not_looking: { label: "Not Looking",       cls: "tag-status-not_looking" },
    };

    function initials(name) {
      if (!name) return "?";
      return name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
    }

    function renderDirectory() {
      const token = localStorage.getItem(TOKEN_KEY);
      const email = localStorage.getItem("gs_employer_email") || "";

      const sessionBar = token ? `
        <div class="session-bar">
          <span>Signed in as <strong>${email}</strong></span>
          <button class="btn-logout" onclick="logout()">Sign out</button>
        </div>` : "";

      const search  = (document.getElementById("f-search")?.value || "").toLowerCase();
      const fSteam  = document.getElementById("f-steam")?.value  || "";
      const fStatus = document.getElementById("f-status")?.value || "";

      const filtered = ALL_CANDIDATES.filter(c => {
        const matchSearch = !search ||
          (c.display_name || "").toLowerCase().includes(search) ||
          (c.bio || "").toLowerCase().includes(search) ||
          (Array.isArray(c.skills) ? c.skills.join(" ").toLowerCase() : "").includes(search);
        const matchSteam  = !fSteam  || c.steam_badge === fSteam;
        const matchStatus = !fStatus || c.open_to_work === fStatus;
        return matchSearch && matchSteam && matchStatus;
      });

      document.getElementById("resultsMeta").textContent =
        filtered.length === ALL_CANDIDATES.length
          ? `${ALL_CANDIDATES.length} candidate${ALL_CANDIDATES.length !== 1 ? "s" : ""}`
          : `${filtered.length} of ${ALL_CANDIDATES.length} candidates match`;

      const list = filtered.map(c => {
        const status  = STATUS_MAP[c.open_to_work] || STATUS_MAP.open;
        const icon    = STEAM_ICONS[c.steam_badge] || "";
        const skills  = Array.isArray(c.skills) ? c.skills.slice(0, 3) : [];
        return `
          <div class="candidate-card" onclick="location.href='/profile.html?id=${c.hedera_account_id}'">
            <div class="cand-avatar">
              ${c.avatar_url ? `<img src="${c.avatar_url}" alt="avatar" />` : initials(c.display_name)}
            </div>
            <div class="cand-info">
              <div class="cand-name">${c.display_name || "Anonymous"}</div>
              <div class="cand-bio">${c.bio || "No bio provided."}</div>
              <div class="cand-tags">
                ${c.steam_badge ? `<span class="tag tag-steam">${icon} ${c.steam_badge}</span>` : ""}
                ${c.steam_level ? `<span class="tag tag-level">Level ${c.steam_level}</span>` : ""}
                <span class="tag ${status.cls}">${status.label}</span>
                ${skills.map(s => `<span class="tag">${s}</span>`).join("")}
              </div>
            </div>
            <div class="cand-action">
              <a class="btn-view" href="/profile.html?id=${c.hedera_account_id}">View Profile →</a>
            </div>
          </div>`;
      }).join("") || `<div class="no-results">No candidates match your filters.</div>`;

      document.getElementById("candidateList").innerHTML = list;
    }

    function renderLayout(token, email) {
      document.getElementById("directoryRoot").innerHTML = `
        ${token ? `
        <div class="session-bar">
          <span>Signed in as <strong>${email}</strong></span>
          <button class="btn-logout" onclick="logout()">Sign out</button>
        </div>` : ""}

        <div class="dir-layout">
          <aside class="filters-panel">
            <h3>Filters</h3>
            <div class="filter-group">
              <label>STEAM Category</label>
              <select id="f-steam" onchange="renderDirectory()">
                <option value="">All categories</option>
                <option value="Science">Science</option>
                <option value="Technology">Technology</option>
                <option value="Engineering">Engineering</option>
                <option value="Art">Art</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="filter-group">
              <label>Availability</label>
              <select id="f-status" onchange="renderDirectory()">
                <option value="">All</option>
                <option value="looking">Actively Looking</option>
                <option value="open">Open to Offers</option>
                <option value="not_looking">Not Looking</option>
              </select>
            </div>
            <button class="filter-reset" onclick="resetFilters()">Reset filters</button>
          </aside>

          <div>
            <div class="search-bar">
              <input id="f-search" type="text" placeholder="Search name, bio, skills…" oninput="renderDirectory()" />
            </div>
            <p class="results-meta" id="resultsMeta"></p>
            <div id="candidateList"><p class="loading">Loading candidates…</p></div>
          </div>
        </div>`;
    }

    function renderLoginGate() {
      document.getElementById("directoryRoot").innerHTML = `
        <div class="login-gate">
          <h2>Employer Sign In</h2>
          <p>The candidate directory is available to verified employers. Sign in to browse and connect with talent.</p>
          <div class="login-form">
            <input id="empEmail" type="email" placeholder="Your email" />
            <input id="empPass"  type="password" placeholder="Password" />
            <button class="btn" onclick="doLogin()">Sign In</button>
            <div class="login-error" id="loginError"></div>
          </div>
          <p style="margin-top:24px;font-size:.82rem;opacity:.5">
            Not an employer yet? <a href="/employers.html">Learn more about joining →</a>
          </p>
        </div>`;
    }

    async function doLogin() {
      const email = document.getElementById("empEmail").value.trim();
      const pass  = document.getElementById("empPass").value.trim();
      const err   = document.getElementById("loginError");
      err.textContent = "";

      try {
        const res  = await fetch(apiBase + "/api/employer/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password: pass }),
        });
        const data = await res.json();
        if (data.ok) {
          localStorage.setItem(TOKEN_KEY, data.token);
          localStorage.setItem("gs_employer_email", email);
          init();
        } else {
          err.textContent = "Invalid credentials. Contact Desiree to get access.";
        }
      } catch {
        err.textContent = "Could not connect. Is the backend running?";
      }
    }

    function logout() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem("gs_employer_email");
      renderLoginGate();
    }

    function resetFilters() {
      const fs = document.getElementById("f-steam");
      const fst = document.getElementById("f-status");
      const fs2 = document.getElementById("f-search");
      if (fs)  fs.value  = "";
      if (fst) fst.value = "";
      if (fs2) fs2.value = "";
      renderDirectory();
    }

    async function init() {
      const token = localStorage.getItem(TOKEN_KEY);
      const email = localStorage.getItem("gs_employer_email") || "";

      if (!token) { renderLoginGate(); return; }

      renderLayout(token, email);

      try {
        const res  = await fetch(apiBase + "/api/candidates", {
          headers: { "Authorization": "Bearer " + token }
        });

        if (res.status === 401) { logout(); return; }

        const data = await res.json();
        ALL_CANDIDATES = data.candidates || [];
        renderDirectory();
      } catch {
        document.getElementById("candidateList").innerHTML =
          `<div class="no-results">⚠️ Could not load candidates. Is the backend running?</div>`;
      }
    }

    init();
  </script>
</body>
</html>
